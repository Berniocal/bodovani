<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Počítadlo bodů</title>

<style>
  :root{
    --bg:#020617;
    --panel:#0b1220;
    --accent:#38bdf8;
    --accent2:#6366f1;
    --text:#e5e7eb;
    --muted:#94a3b8;
    --danger:#f43f5e;
    --radius:16px;
  }

  *{
    box-sizing:border-box;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }

  body{
    margin:0;
    padding:12px;
    background:radial-gradient(circle at top,#1e293b,#020617 60%);
    color:var(--text);
  }

  h1{
    margin:0 0 4px;
    font-size:1.8rem;
    font-weight:700;
  }

  .sub{
    margin:0 0 14px;
    font-size:1rem;
    color:var(--muted);
  }

  .tabs-wrap{
    margin:6px 0 16px;
    display:flex;
    gap:6px;
  }

  .tab-btn{
    flex:1;
    text-align:center;
    border:none;
    padding:10px 14px;
    border-radius:999px;
    background:#0f172a;
    color:var(--muted);
    font-size:1rem;
    cursor:pointer;
  }

  .tab-btn.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
  }

  .hidden{display:none;}

  .players{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .player-row{
    background:#0f172a;
    padding:10px;
    border-radius:var(--radius);
  }

  .player-name input{
    width:100%;
    border-radius:999px;
    border:1px solid #1f2937;
    background:#020617;
    padding:8px 12px;
    color:var(--text);
    font-size:1rem;
    margin-bottom:8px;
  }

  .controls{
    display:flex;
    align-items:center;
    gap:8px;
    justify-content:flex-end;
  }

  .pill{
    min-width:48px;
    text-align:center;
    padding:6px 8px;
    border-radius:999px;
    background:#020617;
    border:1px solid #1f2937;
    font-size:1rem;
  }

  .pill-total{
    background:#052e16;
    border-color:#16a34a;
    color:#bbf7d0;
  }

  .btn-mini{
    width:36px;
    height:36px;
    border-radius:999px;
    border:none;
    font-size:1.4rem;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:white;
  }

  .btn-minus{background:#e11d48;}
  .btn-plus{background:#22c55e;}

  .round-input{
    width:56px;
    text-align:center;
    border-radius:999px;
    border:1px solid #1f2937;
    background:#020617;
    padding:6px 8px;
    color:var(--text);
    font-size:1rem;
  }

  .footer-bar{
    margin-top:16px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .btn{
    flex:1;
    border:none;
    border-radius:999px;
    padding:12px;
    font-size:1rem;
    cursor:pointer;
  }

  .btn-secondary{background:#0f172a;color:var(--text);}
  .btn-danger{background:#f43f5e;color:white;}
  .btn-success{background:#16a34a;color:white;}
  .btn-export{background:#3b82f6;color:white;}

  .round-info{
    display:flex;
    justify-content:flex-end;
    margin-bottom:10px;
  }

  .round-badge{
    padding:4px 10px;
    border-radius:999px;
    background:#0f172a;
    border:1px solid #1f2937;
  }

  .app{
    width:100%;
    max-width:900px;
    margin:0 auto;
  }
</style>
</head>

<body>
<div class="app">

<h1>Počítadlo bodů</h1>
<p class="sub">Vyber typ počítadla, který chceš použít.</p>

<div class="tabs-wrap">
  <button id="tabSimple" class="tab-btn active">Jednoduché počítadlo</button>
  <button id="tabRounds" class="tab-btn">Počítadlo na kola</button>
</div>

<div id="viewSimple">
  <div id="simplePlayers" class="players"></div>
  <div class="footer-bar">
    <button class="btn btn-secondary" id="btnAddSimple">+ Přidat hráče</button>
    <button class="btn btn-danger" id="btnResetSimple">Vynulovat všechny</button>
  </div>
</div>

<div id="viewRounds" class="hidden">

  <div class="round-info">
    <span>Kolo: <span id="roundNumber">1</span></span>
  </div>

  <div id="roundPlayers" class="players"></div>

  <div class="footer-bar">
    <button class="btn btn-secondary" id="btnAddRound">+ Přidat hráče</button>
    <button class="btn btn-success" id="btnNextRound">Další kolo</button>
  </div>

  <div class="footer-bar">
    <button class="btn btn-danger" id="btnResetRounds">Vynulovat všechny</button>
    <button class="btn btn-export" id="btnExportRounds">Export PDF</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
const roundContainer=document.getElementById('roundPlayers');
const roundNumberEl=document.getElementById('roundNumber');

let roundPlayers=[];
let roundId=1;
let currentRound=1;
let history=[];

document.getElementById('btnAddRound').onclick=()=>addRound();

document.getElementById('btnNextRound').onclick=()=>{
  const snapshot = roundPlayers.map(p=>p.roundDelta);
  history.push(snapshot);

  roundPlayers.forEach(p=>{
    p.total += p.roundDelta;
    p.roundDelta = 0;
  });

  currentRound++;
  updateRoundLabel();
  renderRounds();
};

document.getElementById('btnExportRounds').onclick=()=>exportPDF();

function updateRoundLabel(){
  roundNumberEl.textContent=currentRound;
}

function addRound(){
  roundPlayers.push({id:roundId++,name:'',total:0,roundDelta:0});
  renderRounds();
}

function renderRounds(){
  roundContainer.innerHTML='';

  roundPlayers.forEach(p=>{
    const row=document.createElement('div');
    row.className='player-row';

    const nameWrap=document.createElement('div');
    nameWrap.className='player-name';

    const inp=document.createElement('input');
    inp.placeholder='Jméno hráče';
    inp.value=p.name;
    inp.oninput=()=>p.name=inp.value;

    nameWrap.appendChild(inp);

    const controls=document.createElement('div');
    controls.className='controls';

    const total=document.createElement('div');
    total.className='pill pill-total';
    total.textContent=p.total;

    const minus=document.createElement('button');
    minus.className='btn-mini btn-minus';
    minus.textContent='−';
    minus.onclick=()=>{p.roundDelta--;renderRounds();};

    const inpRound=document.createElement('input');
    inpRound.className='round-input';
    inpRound.type='number';
    inpRound.value=p.roundDelta;

    inpRound.onfocus=()=>inpRound.select();

    inpRound.oninput=()=>{
      p.roundDelta=parseInt(inpRound.value)||0;
    };

    const plus=document.createElement('button');
    plus.className='btn-mini btn-plus';
    plus.textContent='+';
    plus.onclick=()=>{p.roundDelta++;renderRounds();};

    controls.appendChild(total);
    controls.appendChild(minus);
    controls.appendChild(inpRound);
    controls.appendChild(plus);

    row.appendChild(nameWrap);
    row.appendChild(controls);

    roundContainer.appendChild(row);
  });
}

function exportPDF(){
  let html=`<h2>Historie kol</h2><table border="1" style="border-collapse:collapse;width:100%">`;

  html+="<tr><th>Hráč</th>";
  history.forEach((_,i)=>html+=`<th>Kolo ${i+1}</th>`);
  html+="<th>Celkem</th></tr>";

  roundPlayers.forEach((p,i)=>{
    html+=`<tr><td>${p.name||'Hráč '+(i+1)}</td>`;

    let sum=0;
    history.forEach(h=>{
      const val=h[i]||0;
      sum+=val;
      html+=`<td>${val}</td>`;
    });

    html+=`<td>${sum}</td></tr>`;
  });

  html+="</table>";

  const el=document.createElement('div');
  el.innerHTML=html;

  html2pdf().from(el).save('historie.pdf');
}

addRound();
updateRoundLabel();
</script>

</div>
</body>
</html>
