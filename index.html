<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Počítadlo bodů</title>

<style>
  :root{
    --bg:#020617;
    --panel:#0b1220;
    --accent:#38bdf8;
    --accent2:#6366f1;
    --text:#e5e7eb;
    --muted:#94a3b8;
    --danger:#f43f5e;
    --radius:16px;
  }

  *{
    box-sizing:border-box;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }

  body{
    margin:0;
    padding:12px;
    background:radial-gradient(circle at top,#1e293b,#020617 60%);
    color:var(--text);
  }

  h1{
    margin:0 0 4px;
    font-size:1.8rem;
    font-weight:700;
    text-align:left;
  }

  .sub{
    margin:0 0 14px;
    font-size:1rem;
    color:var(--muted);
  }

  .tabs-wrap{
    margin:6px 0 16px;
    display:flex;
    gap:6px;
  }

  .tab-btn{
    flex:1;
    text-align:center;
    border:none;
    padding:10px 14px;
    border-radius:999px;
    background:#0f172a;
    color:var(--muted);
    font-size:1rem;
    cursor:pointer;
  }

  .tab-btn.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
  }

  .hidden{display:none;}

  .players{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .player-row{
    display:flex;
    align-items:center;
    gap:8px;
    background:#0f172a;
    padding:0px;
    border-radius:var(--radius);
  }

  .player-name{
    flex:2;
  }
  .player-name input{
    width:100%;
    border-radius:999px;
    border:1px solid #1f2937;
    background:#020617;
    padding:8px 12px;
    color:var(--text);
    font-size:1rem;
  }

  .pill{
    min-width:48px;
    text-align:center;
    padding:6px 8px;
    border-radius:999px;
    background:#020617;
    border:1px solid #1f2937;
    font-size:1rem;
    font-variant-numeric:tabular-nums;
  }

  .pill-total{
    background:#052e16;
    border-color:#16a34a;
    color:#bbf7d0;
    min-width:56px;
  }

  .btn-mini{
    width:36px;
    height:36px;
    border-radius:999px;
    border:none;
    font-size:1.4rem;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:white;
  }
  .btn-mini:active{transform:scale(.94);}

  .btn-minus{background:#e11d48;}
  .btn-plus{background:#0ea5e9;}
  .btn-plus-round{background:#22c55e;}

  .footer-bar{
    margin-top:16px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .btn{
    flex:1;
    border:none;
    border-radius:999px;
    padding:12px;
    font-size:1rem;
    cursor:pointer;
    text-align:center;
  }
  .btn-secondary{
    background:#0f172a;
    color:var(--text);
    border:1px solid #1f2937;
  }
  .btn-danger{background:#f43f5e;color:white;}
  .btn-success{background:#16a34a;color:white;}
  .btn-export{background:#3b82f6;color:white;}

  .round-input{
    width:56px;
    text-align:center;
    border-radius:999px;
    border:1px solid #1f2937;
    background:#020617;
    padding:6px 8px;
    color:var(--text);
    font-size:1rem;
    font-variant-numeric:tabular-nums;
  }

  .round-info{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    margin-bottom:10px;
    gap:6px;
    font-size:0.95rem;
    color:var(--muted);
  }

  .round-badge{
    padding:4px 10px;
    border-radius:999px;
    background:#0f172a;
    border:1px solid #1f2937;
    font-weight:600;
    color:#e5e7eb;
  }

  .app{
    width:100%;
    max-width:900px;
    margin:0 auto;
  }

</style>
</head>

<body>
<div class="app">

<h1>Počítadlo bodů</h1>
<p class="sub">Vyber typ počítadla, který chceš použít.</p>

<div class="tabs-wrap">
  <button id="tabSimple" class="tab-btn active">Jednoduché počítadlo</button>
  <button id="tabRounds" class="tab-btn">Počítadlo na kola</button>
</div>

<div id="viewSimple">
  <div id="simplePlayers" class="players"></div>

  <div class="footer-bar">
    <button class="btn btn-secondary" id="btnAddSimple">+ Přidat hráče</button>
    <button class="btn btn-danger" id="btnResetSimple">Vynulovat všechny</button>
    <button class="btn btn-export" id="btnExportSimple">Export PDF</button>
  </div>
</div>

<div id="viewRounds" class="hidden">

  <div class="round-info">
    <span>Aktuální kolo:</span>
    <span class="round-badge" id="roundNumber">1</span>
  </div>

  <div id="roundPlayers" class="players"></div>

  <div class="footer-bar">
    <button class="btn btn-secondary" id="btnAddRound">+ Přidat hráče</button>
    <button class="btn btn-success" id="btnNextRound">Další kolo</button>
  </div>

  <div class="footer-bar">
    <button class="btn btn-danger" id="btnResetRounds">Vynulovat všechny</button>
    <button class="btn btn-export" id="btnExportRounds">Export PDF</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

/* ---- Přepínání záložek ---- */
const tabSimple=document.getElementById('tabSimple');
const tabRounds=document.getElementById('tabRounds');
const viewSimple=document.getElementById('viewSimple');
const viewRounds=document.getElementById('viewRounds');

tabSimple.onclick=()=>setTab('simple');
tabRounds.onclick=()=>setTab('rounds');

function setTab(t){
  if(t==='simple'){
    tabSimple.classList.add('active');
    tabRounds.classList.remove('active');
    viewSimple.classList.remove('hidden');
    viewRounds.classList.add('hidden');
  }else{
    tabRounds.classList.add('active');
    tabSimple.classList.remove('active');
    viewRounds.classList.remove('hidden');
    viewSimple.classList.add('hidden');
  }
}

/* ---- Jednoduché počítadlo ---- */
const simpleContainer=document.getElementById('simplePlayers');
let simplePlayers=[]; let simpleId=1;

document.getElementById('btnAddSimple').onclick=()=>addSimple();
document.getElementById('btnResetSimple').onclick=()=>{
  simplePlayers.forEach(p=>p.score=0);
  renderSimple();
};

function addSimple(){
  simplePlayers.push({id:simpleId++,name:'',score:0});
  renderSimple();
}

function renderSimple(){
  simpleContainer.innerHTML='';
  simplePlayers.forEach(p=>{
    const row=document.createElement('div');
    row.className='player-row';

    const name=document.createElement('div');
    name.className='player-name';
    const inp=document.createElement('input');
    inp.placeholder='Jméno hráče';
    inp.value=p.name;
    inp.oninput=()=>p.name=inp.value;
    name.appendChild(inp);

    const minus=document.createElement('button');
    minus.className='btn-mini btn-minus';
    minus.textContent='−';
    minus.onclick=()=>{p.score--;renderSimple();};

    const score=document.createElement('div');
    score.className='pill';
    score.textContent=p.score;

    const plus=document.createElement('button');
    plus.className='btn-mini btn-plus';
    plus.textContent='+';
    plus.onclick=()=>{p.score++;renderSimple();};

    row.append(name,minus,score,plus);
    simpleContainer.appendChild(row);
  });
}

/* ---- Počítadlo na kola ---- */
const roundContainer=document.getElementById('roundPlayers');
const roundNumberEl=document.getElementById('roundNumber');
let roundPlayers=[]; 
let roundId=1;
let currentRound=1;
let roundHistory=[];

document.getElementById('btnAddRound').onclick=()=>addRound();

document.getElementById('btnNextRound').onclick=()=>{
  roundHistory.push(roundPlayers.map(p=>p.roundDelta));

  roundPlayers.forEach(p=>{
    p.total += p.roundDelta;
    p.roundDelta = 0;
  });

  currentRound++;
  roundNumberEl.textContent=currentRound;
  renderRounds();
};

function addRound(){
  roundPlayers.push({id:roundId++,name:'',total:0,roundDelta:0});
  renderRounds();
}

function renderRounds(){
  roundContainer.innerHTML='';
  roundPlayers.forEach(p=>{
    const row=document.createElement('div');
    row.className='player-row';
    row.style.flexDirection='column';
    row.style.padding='10px';

    const nameWrap=document.createElement('div');
    nameWrap.className='player-name';

    const inp=document.createElement('input');
    inp.placeholder='Jméno hráče';
    inp.value=p.name;
    inp.oninput=()=>p.name=inp.value;

    nameWrap.appendChild(inp);

    const controls=document.createElement('div');
    controls.style.display='flex';
    controls.style.gap='8px';
    controls.style.alignItems='center';

    const total=document.createElement('div');
    total.className='pill pill-total';
    total.textContent=p.total;

    const minus=document.createElement('button');
    minus.className='btn-mini btn-minus';
    minus.textContent='−';
    minus.onclick=()=>{p.roundDelta--;renderRounds();};

    const inpRound=document.createElement('input');
    inpRound.className='round-input';
    inpRound.type='number';
    inpRound.value=p.roundDelta;

    inpRound.onfocus=()=>inpRound.select();

    inpRound.oninput=()=>{
      p.roundDelta=parseInt(inpRound.value)||0;
    };

    const plus=document.createElement('button');
    plus.className='btn-mini btn-plus-round';
    plus.textContent='+';
    plus.onclick=()=>{p.roundDelta++;renderRounds();};

    controls.append(total,minus,inpRound,plus);

    row.append(nameWrap,controls);
    roundContainer.appendChild(row);
  });
}

/* ---- Export PDF (historie kol) ---- */
document.getElementById('btnExportRounds').onclick=()=>exportRoundsPDF();

function exportRoundsPDF(){

  const element=document.createElement('div');

  let html = `
  <div style="font-family: Arial; color:#000;">
    <h2>Historie kol</h2>
    <table style="border-collapse:collapse; width:100%;">
      <tr>
        <th style="border:1px solid #000; padding:6px;">Kolo</th>
  `;

  // 🔥 HLAVIČKA = HRÁČI
  roundPlayers.forEach((p,i)=>{
    const name = (p.name && p.name.trim() !== '') ? p.name : ('Hráč ' + (i+1));
    html += `<th style="border:1px solid #000; padding:6px;">${name}</th>`;
  });

  html += `</tr>`;

  // 🔥 ŘÁDKY = KOLA
  roundHistory.forEach((round,i)=>{
    html += `<tr><td style="border:1px solid #000; padding:6px;">${i+1}</td>`;

    roundPlayers.forEach((_,playerIndex)=>{
      const val = round[playerIndex] || 0;
      html += `<td style="border:1px solid #000; padding:6px; text-align:right;">${val}</td>`;
    });

    html += `</tr>`;
  });

  // 🔥 SOUČTY
  html += `<tr><td style="border:1px solid #000; padding:6px;"><b>Celkem</b></td>`;

  roundPlayers.forEach((p,i)=>{
    let sum = 0;
    roundHistory.forEach(r=>{
      sum += r[i] || 0;
    });
    html += `<td style="border:1px solid #000; padding:6px; text-align:right;"><b>${sum}</b></td>`;
  });

  html += `</tr>`;

  html += `</table></div>`;

  element.innerHTML=html;
  document.body.appendChild(element);

  const opt={
    margin:10,
    filename:'historie.pdf',
    html2canvas:{scale:2},
    jsPDF:{unit:'mm',format:'a4',orientation:'landscape'} // 🔥 na šířku!
  };

  setTimeout(()=>{
    html2pdf().set(opt).from(element).save().then(()=>{
      document.body.removeChild(element);
    });
  }, 150);
}

/* start */
addSimple();
addRound();

</script>

</div>
</body>
</html>
